<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YangPeter's Blog — 计算机技术博客</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #ffffff;
            --surface: #f5f5f7;
            --border: #e5e5e7;
            --text: #1a1a2e;
            --text-dim: #6b6b80;
            --purple: #7c3aed;
            --cyan: #0891b2;
            --pink: #db2777;
            --radius: 16px;
            --radius-sm: 10px;
        }

        body {
            font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.7;
        }

        .stars-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .aurora {
            position: fixed;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
            animation: auroraFloat 10s ease-in-out infinite;
        }
        .aurora-1 {
            width: 700px; height: 700px;
            background: radial-gradient(circle, #c4b5fd 0%, transparent 70%);
            top: -300px; right: -200px;
        }
        .aurora-2 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #a5f3fc 0%, transparent 70%);
            bottom: -200px; left: -150px;
            animation-delay: -5s;
        }
        @keyframes auroraFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -40px) scale(1.1); }
        }

        /* 导航栏 */
        .nav {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .nav-brand {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .nav-links {
            display: flex;
            gap: 28px;
            list-style: none;
        }
        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: var(--text); }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            max-width: 760px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* 个人头部 */
        .hero {
            margin-top: 60px;
            margin-bottom: 64px;
            text-align: center;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--purple), var(--cyan), var(--pink));
            padding: 3px;
            margin: 0 auto 24px;
            animation: avatarGlow 4s ease-in-out infinite;
        }
        .avatar-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            overflow: hidden;
        }
        .avatar-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        @keyframes avatarGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(124, 58, 237, 0.15); }
            50% { box-shadow: 0 0 40px rgba(124, 58, 237, 0.3), 0 0 80px rgba(8, 145, 178, 0.1); }
        }
        .hero h1 {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 0.03em;
            margin-bottom: 10px;
        }
        .hero .tagline {
            color: var(--text-dim);
            font-size: 16px;
            margin-bottom: 20px;
        }
        .hero .bio {
            color: var(--text-dim);
            font-size: 14px;
            max-width: 480px;
            margin: 0 auto;
            line-height: 1.9;
        }

        /* 分割线 */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 48px;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
        }
        .divider span {
            color: var(--text-dim);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        /* 文章卡片 */
        .post-card {
            display: block;
            text-decoration: none;
            color: inherit;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 32px;
            margin-bottom: 16px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }
        .post-card:hover {
            transform: translateY(-2px);
            background: #ffffff;
            border-color: var(--purple);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        }
        .post-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .post-date {
            font-size: 13px;
            color: var(--text-dim);
            font-variant-numeric: tabular-nums;
        }
        .post-tag {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
            background: rgba(139, 92, 246, 0.1);
            color: #7c3aed;
            letter-spacing: 0.04em;
        }
        .post-tag.cyan { background: rgba(8, 145, 178, 0.1); color: #0891b2; }
        .post-tag.pink { background: rgba(219, 39, 119, 0.1); color: #db2777; }
        .post-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .post-excerpt {
            font-size: 14px;
            color: var(--text-dim);
            line-height: 1.8;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .post-footer {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-top: 16px;
            font-size: 12px;
            color: var(--text-dim);
        }

        /* 加载更多 */
        .load-more {
            display: block;
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            margin-bottom: 80px;
            text-align: center;
            color: var(--text-dim);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .load-more:hover {
            border-color: var(--purple);
            color: var(--text);
            background: #ffffff;
        }

        /* 快捷入口 */
        .quick-links {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 80px;
        }
        .quick-link {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 24px 16px;
            text-align: center;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s ease;
        }
        .quick-link:hover {
            border-color: var(--purple);
            background: #ffffff;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
        }
        .quick-link .icon { font-size: 28px; margin-bottom: 10px; }
        .quick-link .label { font-size: 13px; color: var(--text-dim); }

        /* 页脚 */
        .footer {
            text-align: center;
            padding: 40px 24px;
            border-top: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 13px;
        }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .footer-links a {
            color: var(--text-dim);
            text-decoration: none;
            transition: color 0.2s;
        }
        .footer-links a:hover { color: var(--purple); }

        @media (max-width: 640px) {
            .nav { padding: 12px 16px; }
            .nav-links { display: none; }
            .hero { margin-top: 40px; margin-bottom: 48px; }
            .hero h1 { font-size: 28px; }
            .post-card { padding: 20px 20px; }
            .post-title { font-size: 18px; }
            .quick-links { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .quick-link { padding: 16px 10px; }
            .quick-link .icon { font-size: 22px; }
        }
    </style>
</head>
<body>
    <canvas class="stars-canvas" id="stars"></canvas>
    <div class="aurora aurora-1"></div>
    <div class="aurora aurora-2"></div>

    <nav class="nav">
        <div class="nav-brand">YangPeter</div>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="/posts/about.html">About</a></li>
        </ul>
    </nav>

    <main class="container">
        <section class="hero" id="home">
            <div class="avatar">
                <div class="avatar-inner">
                    <img src="avatar.jpg" alt="YangPeter">
                </div>
            </div>
            <h1>YangPeter</h1>
            <p class="tagline">网络安全工程师 · 终身学习者</p>
            <p class="bio">
                永远学习，永远保持好奇。这里记录我的技术思考、项目复盘和源码阅读笔记。
            </p>
        </section>

        <a class="post-card" href="/posts/about.html">
            <h2 class="post-title">关于我</h2>
            <p class="post-excerpt">你好，我是 YangPeter。此刻无语，点进来看看。</p>
            <div class="post-footer">
                <span>了解更多 →</span>
            </div>
        </a>

    </main>

    <footer class="footer">
        <div class="footer-links">
            <a href="https://github.com/yangpeter26-bot" target="_blank" rel="noopener">GitHub</a>
            <a href="/rss.xml">RSS</a>
            <a href="mailto:yangpeter26@gmail.com">邮件联系</a>
        </div>
        <p>© 2026 YangPeter's Blog</p>
    </footer>

    <script>
        (function() {
            const canvas = document.getElementById("stars");
            const ctx = canvas.getContext("2d");
            const STARS = [];
            const TOTAL = 120;

            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            resize();
            window.addEventListener("resize", resize);

            for (let i = 0; i < TOTAL; i++) {
                STARS.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 1.8 + 0.3,
                    speed: Math.random() * 0.3 + 0.05,
                    twinkle: Math.random() * Math.PI * 2,
                    twinkleSpeed: Math.random() * 0.015 + 0.003
                });
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < STARS.length; i++) {
                    var s = STARS[i];
                    s.twinkle += s.twinkleSpeed;
                    var alpha = 0.2 + Math.sin(s.twinkle) * 0.35;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = "rgba(160, 170, 200, " + alpha + ")";
                    ctx.fill();
                    s.y -= s.speed;
                    if (s.y < -5) { s.y = canvas.height + 5; s.x = Math.random() * canvas.width; }
                }
                requestAnimationFrame(draw);
            }
            draw();
        })();

    </script>
</body>
</html>
