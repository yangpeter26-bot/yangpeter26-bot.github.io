<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于我 - YangPeter</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a2e;
            --text-dim: #6b6b80;
            --purple: #7c3aed;
        }
        body {
            max-width: 760px;
            margin: 80px auto;
            padding: 0 24px;
            font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text);
            line-height: 2;
            font-size: 16px;
            background: var(--bg);
        }
        .back {
            color: var(--purple);
            text-decoration: none;
            font-size: 14px;
        }
        .back:hover { text-decoration: underline; }
        h1 {
            font-size: 28px;
            margin-top: 12px;
            margin-bottom: 24px;
        }
        hr {
            border: none;
            border-top: 1px solid #e5e5e7;
            margin: 32px 0;
        }
        p {
            color: var(--text-dim);
        }
    </style>
</head>
<body>
    <a class="back" href="/">← 返回首页</a>
    <h1>关于我</h1>
    <hr>
    <p>你好，我是 <strong style="color: var(--text);">YangPeter</strong>。</p>
    <p>此刻无语。</p>
    <p>不是没话说，是觉得空白也挺好。这个博客就像一张白纸，等着被填满。可能写技术，可能写牢骚，也可能什么都没写。总之，来都来了，看看吧。</p>
    <hr>
    <p><a class="back" href="/">← 返回首页</a></p>
</body>
</html>
